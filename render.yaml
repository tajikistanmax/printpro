# PrintPro — описание развёртывания для Render.com
# Render прочитает этот файл и сам создаст базу и два сервиса.

databases:
  - name: printpro-db
    plan: free
    databaseName: printpro
    user: printpro

services:
  # ----- Бэкенд (NestJS API) -----
  - type: web
    name: printpro-api
    runtime: node
    plan: free
    rootDir: printpro-api
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma migrate deploy && npx ts-node prisma/seed.ts
    startCommand: node dist/main.js
    healthCheckPath: /api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: printpro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render сам сгенерирует надёжный ключ
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_VERSION
        value: "22"

  # ----- Фронтенд (Next.js панель + сайт) -----
  - type: web
    name: printpro-web
    runtime: node
    plan: free
    rootDir: printpro-web
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      # ВАЖНО: после деплоя бэкенда вставьте сюда его адрес.
      # Например: https://printpro-api.onrender.com/api
      - key: NEXT_PUBLIC_API_BASE
        sync: false
      # Корень бэкенда (для файлов), например: https://printpro-api.onrender.com
      - key: NEXT_PUBLIC_SERVER_ORIGIN
        sync: false
      # ID нашей компании (создаётся автоматически в seed)
      - key: NEXT_PUBLIC_COMPANY_ID
        value: 7628001a-5f9c-45ec-8f6f-a80280d409c5
      - key: NODE_VERSION
        value: "22"
