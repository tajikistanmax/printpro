# Непрерывная интеграция: проверяем сборку/типы/тесты/линт на каждый PR и push в main.
# Раньше в репозитории не было CI — регрессии (в т.ч. денежной логики) ловились
# только вручную. Теперь пайплайн падает до мержа, если что-то сломано.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Отменяем устаревшие прогоны при новом пуше в ту же ветку/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: printpro-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: printpro-api/package-lock.json
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Tests
        run: npm test
      - name: Lint
        run: npm run lint

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: printpro-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: printpro-web/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
